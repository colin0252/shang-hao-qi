name: Build iOS App (Unsigned)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: cd App && xcodegen

    - name: Build app (no signing)
      run: |
        xcodebuild -project App/DeltaLogin.xcodeproj \
          -scheme DeltaLogin \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          -derivedDataPath ./build

    - name: Package IPA
      run: |
        mkdir Payload
        cp -R ./build/Build/Products/Release-iphoneos/DeltaLogin.app Payload/
        zip -r DeltaLogin.ipa Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: DeltaLogin.ipa
        path: DeltaLogin.ipa