name: DeltaLogin
options:
  bundleIdPrefix: com.fake
  deploymentTarget:
    iOS: "16.0"                      # 对齐成功案例的 16.0
targets:
  DeltaLogin:
    type: application
    platform: iOS
    sources:
      - path: .
        type: group
        includes:
          - "*.swift"
    resources:
      - path: Base.lproj/LaunchScreen.storyboard   # 编译 LaunchScreen.storyboard
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1,2"               # 与成功案例完全一致
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"           # 明确设置
    info:
      path: Info.plist